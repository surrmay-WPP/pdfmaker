name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npx vite build

      - run: npm install -g @yao-pkg/pkg

      - run: npx pkg server/index.cjs --target node18-win-x64 --output dist/pdfmaker.exe

      - uses: actions/upload-artifact@v4
        with:
          name: pdfmaker-exe
          path: dist/pdfmaker.exe